# Render Blueprint — single source of truth for the deployment.
# Apply this once via Render Dashboard → New → Blueprint → point at the repo.
#
# After the first deploy, set these in the Render dashboard under the
# service's "Environment" tab:
#   MINIMAX_API_KEY = sk-...   (your MiniMax key)
#   MINIMAX_BASE_URL = https://api.minimaxi.chat/v1   (only if not the default)
#   MINIMAX_MODEL = MiniMax-M3

services:
  - type: web
    name: vzla-search-bot
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MINIMAX_API_KEY
        sync: false   # set manually in the dashboard, never commit
      - key: MINIMAX_BASE_URL
        value: https://api.minimaxi.chat/v1
      - key: MINIMAX_MODEL
        value: MiniMax-M3
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright
      - key: PLAYWRIGHT_HEADFUL
        value: "0"
    # Render free tier sleeps after 15min of inactivity. First request wakes it.
    # No scaling config needed for the MVP.